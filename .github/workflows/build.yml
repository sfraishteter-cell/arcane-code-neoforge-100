name: Build Arcane Code

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arcane-code-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test and verify resources/JAR
        run: ./gradlew --no-daemon clean build verifyReleaseJar --stacktrace

      - name: Upload development JAR
        uses: actions/upload-artifact@v4
        with:
          name: Arcane-Code-NeoForge-1.21.1-1.0.0-dev
          path: build/libs/Arcane-Code-NeoForge-1.21.1-1.0.0-dev.jar
          if-no-files-found: error
          retention-days: 30

  dedicated-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Start dedicated server without Create
        run: ./scripts/verify-dedicated-server.sh

      - name: Upload dedicated-server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dedicated-server-log
          path: build/reports/dedicated-server.log
          if-no-files-found: warn
          retention-days: 14
