name: Build Arcane Code 1.0.0

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build and verify
        run: gradle --no-daemon clean build verifyReleaseJar --stacktrace

      - name: Upload ready mod
        uses: actions/upload-artifact@v4
        with:
          name: Arcane-Code-NeoForge-1.21.1-1.0.0
          path: build/libs/Arcane-Code-NeoForge-1.21.1-1.0.0.jar
          if-no-files-found: error
          retention-days: 30
